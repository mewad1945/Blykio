<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLYKIO - Online</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --p: #6366f1; --p-dark: #4f46e5; --bg: #0f172a; --box: #1e293b; --text: #f8fafc; --imp: #ef4444; --inn: #22c55e; --accent: #38bdf8; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .hidden { display: none !important; }
        .box { width: 90%; max-width: 450px; background: var(--box); padding: 40px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); text-align: center; }
        h1 { font-size: 3rem; font-weight: 800; background: linear-gradient(to right, var(--p), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; letter-spacing: -2px; }
        p { color: #94a3b8; margin-bottom: 25px; }
        label { display: block; text-align: left; margin: 10px 0 5px 5px; font-size: 0.9rem; font-weight: 600; color: #64748b; }
        input, select { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 12px; border: 2px solid #334155; background: #0f172a; color: #fff; font-size: 16px; box-sizing: border-box; outline: none; }
        button { background: var(--p); color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: 700; width: 100%; font-size: 1rem; transition: all 0.2s; margin-top: 10px; }
        button:hover { background: var(--p-dark); transform: translateY(-2px); }
        .secondary-btn { background: #334155; margin-top: 15px; }
        .chat { height: 250px; background: #0f172a; overflow-y: auto; padding: 15px; margin: 20px 0; border-radius: 16px; border: 1px solid #334155; text-align: left; font-size: 0.95rem; }
        .role-card { padding: 25px; border-radius: 16px; margin-bottom: 25px; font-weight: 700; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); }
        .status-bar { background: rgba(0,0,0,0.2); padding: 10px 20px; border-radius: 100px; display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; color: #94a3b8; margin-bottom: 20px; }
        .game-item { background: #334155; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; cursor: pointer; }
        .vote-btn { background: #0f172a; border: 1px solid var(--accent); color: var(--accent); }
        .vote-btn:hover { background: var(--accent); color: white; }
    </style>
</head>
<body>

<div id="app" style="width: 100%; display: flex; justify-content: center;">
    <div id="screen-login" class="box">
        <h1>BLYKIO</h1>
        <p>Skapa en profil för att spela</p>
        <label>ANVÄNDARNAMN</label>
        <input type="text" id="username" placeholder="Ditt namn...">
        <button onclick="login()">ANSLUT NU</button>
    </div>

    <div id="screen-menu" class="box hidden">
        <h1>BLYKIO</h1>
        <p>Välkommen, <span id="display-name" style="color:var(--accent); font-weight: bold;"></span></p>
        <button onclick="showScreen('screen-create')">SKAPA NYTT SPEL</button>
        <button class="secondary-btn" onclick="openFindMatch()">HITTA SPEL</button>
    </div>

    <div id="screen-create" class="box hidden">
        <h2>Inställningar</h2>
        <label>KATEGORI</label>
        <select id="setting-cat">
            <option value="Animals">Djur 🦁</option>
            <option value="Food">Mat 🍕</option>
            <option value="Famous People">Kändisar ⭐</option>
            <option value="Objects">Saker 📦</option>
        </select>
        <label>ANTAL IMPOSTERS</label>
        <select id="setting-imp">
            <option value="1">1 Imposter</option>
            <option value="2">2 Imposters</option>
        </select>
        <label>MAX SPELARE</label>
        <input type="number" id="setting-max" value="4" min="2">
        <button onclick="createMatch()">SKAPA LOBBY</button>
        <button onclick="showScreen('screen-menu')" class="secondary-btn">AVBRYT</button>
    </div>

    <div id="screen-join" class="box hidden">
        <h2>Ange Kod</h2>
        <input type="text" id="join-code-input" placeholder="T.ex. ABCD">
        <button onclick="joinByCode()">GÅ MED</button>
        <div id="public-games-list" style="margin-top:20px;"></div>
        <button onclick="showScreen('screen-menu')" class="secondary-btn">TILLBAKA</button>
    </div>

    <div id="screen-game" class="box hidden">
        <div class="status-bar">
            <span>KOD: <b id="match-id-display" style="color:var(--accent)">-</b></span>
            <span>SPELARE: <b id="player-count-display">0/0</b></span>
        </div>

        <div id="game-lobby-area">
            <h3 id="lobby-msg">Väntar på spelare...</h3>
            <div id="lobby-list" style="text-align:left; margin-bottom:20px;"></div>
            <button id="start-btn" class="hidden" onclick="requestStart()">STARTA MATCHEN</button>
        </div>

        <div id="game-play-area" class="hidden">
            <div id="role-box" class="role-card"></div>
            <div class="chat" id="game-chat"></div>
            <p id="turn-indicator" style="font-weight:bold;"></p>
            <div id="turn-input-container">
                <input type="text" id="word-input" placeholder="Skriv din ledtråd...">
                <button onclick="sendWord()">SKICKA</button>
            </div>
            <div id="voting-area" class="hidden">
                <h3>VEM ÄR IMPOSTER?</h3>
                <div id="vote-list"></div>
            </div>
        </div>

        <div id="result-area" class="hidden">
            <h2 id="result-title"></h2>
            <p id="result-desc"></p>
            <button onclick="location.reload()">TILLBAKA TILL MENYN</button>
        </div>
    </div>
</div>

<script>
    const socket = io('http://194.164.206.144:3000'); 
    let myData = { name: '', roomId: '' };

    function showScreen(id) {
        document.querySelectorAll('.box').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function login() {
        myData.name = document.getElementById('username').value.trim();
        if(!myData.name) return alert("Ange namn!");
        document.getElementById('display-name').innerText = myData.name;
        showScreen('screen-menu');
    }

    function createMatch() {
        socket.emit('createMatch', { 
            name: myData.name, 
            settings: { 
                category: document.getElementById('setting-cat').value,
                imposterCount: parseInt(document.getElementById('setting-imp').value),
                maxPlayers: parseInt(document.getElementById('setting-max').value),
                isPublic: true 
            } 
        });
    }

    function openFindMatch() {
        showScreen('screen-join');
        socket.emit('getPublicGames');
    }

    function joinByCode() {
        const code = document.getElementById('join-code-input').value.trim().toUpperCase();
        socket.emit('joinMatch', { name: myData.name, code });
    }

    socket.on('matchCreated', room => setupLobby(room));
    socket.on('matchJoined', room => setupLobby(room));

    function setupLobby(room) {
        myData.roomId = room.id;
        document.getElementById('match-id-display').innerText = room.id;
        showScreen('screen-game');
        updatePlayerList(room.players, room.maxPlayers);
    }

    socket.on('updatePlayers', data => updatePlayerList(data.players, data.maxPlayers));

    function updatePlayerList(players, max) {
        document.getElementById('player-count-display').innerText = `${players.length}/${max}`;
        const list = document.getElementById('lobby-list');
        list.innerHTML = players.map(p => `<div style="padding:10px; background:rgba(255,255,255,0.05); margin-bottom:5px; border-radius:8px;">${p.name} ${p.id === socket.id ? '(Du)' : ''}</div>`).join('');
        
        if (players[0] && socket.id === players[0].id) {
            document.getElementById('start-btn').classList.remove('hidden');
            document.getElementById('lobby-msg').innerText = "Du är ledare!";
        }
    }

    function requestStart() {
        socket.emit('startGame', myData.roomId);
    }

    socket.on('gameStarted', data => {
        document.getElementById('game-lobby-area').classList.add('hidden');
        document.getElementById('game-play-area').classList.remove('hidden');
        const isImp = data.imposters.includes(socket.id);
        const rb = document.getElementById('role-box');
        if(isImp) {
            rb.innerHTML = `<span style="color:var(--imp)">DU ÄR IMPOSTER 😈</span><br>Smält in!`;
        } else {
            rb.innerHTML = `<span style="color:var(--inn)">DU ÄR INNOCENT 😇</span><br>Ordet: <b style="color:white">${data.word}</b>`;
        }
        updateTurnUI(data.turnPlayer);
    });

    function sendWord() {
        const val = document.getElementById('word-input').value.trim();
        if(!val) return;
        socket.emit('sendWord', { roomId: myData.roomId, name: myData.name, word: val });
        document.getElementById('word-input').value = "";
    }

    socket.on('newWord', data => {
        const chat = document.getElementById('game-chat');
        chat.innerHTML += `<p><b style="color:var(--accent)">${data.sender}:</b> ${data.word}</p>`;
        chat.scrollTop = chat.scrollHeight;
        updateTurnUI(data.nextTurn);
    });

    function updateTurnUI(activePlayer) {
        const ti = document.getElementById('turn-indicator');
        const ic = document.getElementById('turn-input-container');
        if(activePlayer === myData.name) {
            ti.innerText = "DIN TUR!";
            ic.classList.remove('hidden');
        } else {
            ti.innerText = `Väntar på ${activePlayer}...`;
            ic.classList.add('hidden');
        }
    }

    socket.on('startVoting', data => {
        document.getElementById('turn-input-container').classList.add('hidden');
        document.getElementById('turn-indicator').innerText = "DAGS ATT RÖSTA!";
        const vl = document.getElementById('vote-list');
        document.getElementById('voting-area').classList.remove('hidden');
        vl.innerHTML = data.players.filter(p => p.id !== socket.id).map(p => 
            `<button class="vote-btn" onclick="castVote('${p.id}')">${p.name}</button>`
        ).join('');
    });

    function castVote(id) {
        socket.emit('castVote', { roomId: myData.roomId, targetId: id });
        document.getElementById('voting-area').innerHTML = "<p>Röst lagd...</p>";
    }

    socket.on('gameResult', data => {
        document.getElementById('game-play-area').classList.add('hidden');
        const resArea = document.getElementById('result-area');
        resArea.classList.remove('hidden');
        document.getElementById('result-title').innerText = data.isCorrect ? "INNOCENTS VANN! 🎉" : "IMPOSTER VANN! 😈";
        document.getElementById('result-desc').innerHTML = `Ni röstade ut: <b>${data.votedOutName}</b><br>Imposter(s) var: <b>${data.imposters.join(', ')}</b><br>Ordet var: <b>${data.word}</b>`;
    });

    socket.on('leaderLeft', () => { alert("Ledaren lämnade. Lobbyn stängs."); location.reload(); });
    socket.on('error', m => alert(m));
</script>
</body>
</html>
