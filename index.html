<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLYKIO - Online</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --p: #5865f2; --bg: #0b0e14; --box: #1c222d; --text: #ffffff; --imp: #ff4757; --inn: #2ed573; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; }
        .hidden { display: none; }
        .box { max-width: 500px; margin: 40px auto; background: var(--box); padding: 30px; border-radius: 20px; border: 1px solid #3e4a61; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { letter-spacing: 5px; color: var(--p); }
        input, select { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; font-size: 16px; }
        button { background: var(--p); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 90%; margin: 10px 0; font-size: 16px; }
        button:hover { filter: brightness(1.2); }
        .chat { height: 300px; background: #0a0c10; overflow-y: auto; text-align: left; padding: 15px; margin: 15px 0; border-radius: 10px; border: 1px solid #333; }
        .chat p { margin: 5px 0; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .timer { font-size: 32px; color: var(--imp); font-weight: bold; margin: 10px; }
        .role-card { padding: 20px; border-radius: 10px; margin-bottom: 20px; font-size: 20px; }
        .vote-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .status-bar { display: flex; justify-content: space-around; font-size: 14px; color: #aaa; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="app">
    <div id="screen-login" class="box">
        <h1>BLYKIO</h1>
        <p>Välj ett användarnamn för att spela online</p>
        <input type="text" id="username" placeholder="Ditt namn...">
        <button onclick="login()">ANSLUT</button>
    </div>

    <div id="screen-menu" class="box hidden">
        <h1>BLYKIO</h1>
        <p>Välkommen, <span id="display-name" style="color:var(--p)"></span>!</p>
        <button onclick="showScreen('screen-create')">CREATE MATCH</button>
        <button onclick="showScreen('screen-join')">FIND MATCH</button>
    </div>

    <div id="screen-create" class="box hidden">
        <h2>Matchinställningar</h2>
        <label>Kategori:</label>
        <select id="setting-cat">
            <option value="Animals">Animals</option>
            <option value="Food">Food</option>
            <option value="Famous People">Famous People</option>
            <option value="Objects">Objects</option>
        </select>
        <label>Max spelare:</label>
        <input type="number" id="setting-max" value="4" min="3">
        <label>Antal Imposters:</label>
        <input type="number" id="setting-imp" value="1" min="1">
        <label>Privat Match (Endast kod): <input type="checkbox" id="setting-private"></label>
        <button onclick="createMatch()">SKAPA LOBBY</button>
        <button onclick="showScreen('screen-menu')" style="background:#444">TILLBAKA</button>
    </div>

    <div id="screen-join" class="box hidden">
        <h2>Hitta Match</h2>
        <input type="text" id="join-code-input" placeholder="Skriv matchkod...">
        <button onclick="joinByCode()">JOIN MED KOD</button>
        <hr style="border: 0.5px solid #333; margin: 20px 0;">
        <div id="public-games-list">Söker efter publika spel...</div>
        <button onclick="showScreen('screen-menu')" style="background:#444">TILLBAKA</button>
    </div>

    <div id="screen-game" class="box hidden">
        <div class="status-bar">
            <span>Kod: <b id="match-id-display"></b></span>
            <span>Spelare: <b id="player-count-display">0/0</b></span>
        </div>

        <div id="game-lobby-area">
            <h3>Väntar på spelare...</h3>
            <div id="lobby-list" style="text-align:left; margin-bottom:20px;"></div>
            <button id="start-btn" class="hidden" onclick="requestStart()">STARTA SPELET</button>
        </div>

        <div id="game-play-area" class="hidden">
            <div id="role-box" class="role-card"></div>
            <div class="timer" id="game-timer">20</div>
            <div class="chat" id="game-chat"></div>
            
            <div id="turn-input-container">
                <p id="turn-indicator" style="font-weight:bold; color:var(--p)"></p>
                <input type="text" id="word-input" placeholder="Skriv ett ord...">
                <button onclick="sendWord()">SKICKA</button>
            </div>

            <div id="vote-section" class="hidden">
                <h2 style="color:var(--imp)">VOTERING!</h2>
                <p>Vem tror du är Imposter?</p>
                <div id="vote-btns" class="vote-grid"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // ÄNDRA TILL DIN VPS IP HÄR!
    const socket = io('http://194.164.206.144:3000'); 

    let myData = { name: '', roomId: '', role: '', word: '', isMyTurn: false };
    let timer;

    function showScreen(id) {
        document.querySelectorAll('.box').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function login() {
        myData.name = document.getElementById('username').value;
        if(!myData.name) return alert("Skriv ett namn!");
        document.getElementById('display-name').innerText = myData.name;
        showScreen('screen-menu');
    }

    function createMatch() {
        const settings = {
            category: document.getElementById('setting-cat').value,
            maxPlayers: parseInt(document.getElementById('setting-max').value),
            imposterCount: parseInt(document.getElementById('setting-imp').value),
            isPublic: !document.getElementById('setting-private').checked
        };
        socket.emit('createMatch', { name: myData.name, settings });
    }

    function joinByCode() {
        const code = document.getElementById('join-code-input').value.toUpperCase();
        socket.emit('joinMatch', { name: myData.name, code });
    }

    socket.on('matchCreated', (room) => {
        setupLobby(room);
    });

    socket.on('updatePlayers', (players) => {
        const list = document.getElementById('lobby-list');
        list.innerHTML = "<b>Anslutna:</b><br>" + players.map(p => "• " + p.name).join('<br>');
        document.getElementById('player-count-display').innerText = `${players.length}/4`;
        
        // Visa startknapp endast för admin (första spelaren)
        if (socket.id === players[0].id) {
            document.getElementById('start-btn').classList.remove('hidden');
        }
    });

    function setupLobby(room) {
        myData.roomId = room.id;
        document.getElementById('match-id-display').innerText = room.id;
        showScreen('screen-game');
    }

    function requestStart() {
        socket.emit('startGame', myData.roomId);
    }

    socket.on('gameStarted', (data) => {
        document.getElementById('game-lobby-area').classList.add('hidden');
        document.getElementById('game-play-area').classList.remove('hidden');
        
        const isImp = data.imposters.includes(socket.id);
        const roleBox = document.getElementById('role-box');
        
        if(isImp) {
            roleBox.innerHTML = `<b class="imposter">DU ÄR IMPOSTER</b><br>Försök gissa ordet!`;
            roleBox.style.border = "2px solid var(--imp)";
        } else {
            roleBox.innerHTML = `<b class="innocent">DU ÄR INNOCENT</b><br>Ordet är: <b>${data.word}</b>`;
            roleBox.style.border = "2px solid var(--inn)";
        }
        
        updateTurnUI(data.turnPlayer);
    });

    function updateTurnUI(activePlayerName) {
        const indicator = document.getElementById('turn-indicator');
        const inputContainer = document.getElementById('turn-input-container');
        
        if(activePlayerName === myData.name) {
            indicator.innerText = "DET ÄR DIN TUR! Skriv ett ord.";
            inputContainer.style.opacity = "1";
            inputContainer.style.pointerEvents = "auto";
            startTimer();
        } else {
            indicator.innerText = `Väntar på ${activePlayerName}...`;
            inputContainer.style.opacity = "0.5";
            inputContainer.style.pointerEvents = "none";
            stopTimer();
        }
    }

    function startTimer() {
        let timeLeft = 20;
        document.getElementById('game-timer').innerText = timeLeft;
        clearInterval(timer);
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('game-timer').innerText = timeLeft;
            if(timeLeft <= 0) {
                sendWord(); // Skicka automatiskt om tiden tar slut
            }
        }, 1000);
    }

    function stopTimer() {
        clearInterval(timer);
        document.getElementById('game-timer').innerText = "20";
    }

    function sendWord() {
        const input = document.getElementById('word-input');
        const word = input.value || "(inget ord)";
        socket.emit('sendWord', { roomId: myData.roomId, name: myData.name, word: word });
        input.value = "";
        stopTimer();
    }

    socket.on('newWord', (data) => {
        const chat = document.getElementById('game-chat');
        chat.innerHTML += `<p><strong>${data.sender}:</strong> ${data.word}</p>`;
        chat.scrollTop = chat.scrollHeight;

        if(data.isVoteTime) {
            showVoting(data.allPlayers);
        } else {
            updateTurnUI(data.nextTurn);
        }
    });

    function showVoting(players) {
        document.getElementById('turn-input-container').classList.add('hidden');
        document.getElementById('vote-section').classList.remove('hidden');
        const btnContainer = document.getElementById('vote-btns');
        btnContainer.innerHTML = "";
        
        players.forEach(p => {
            const btn = document.createElement('button');
            btn.innerText = p.name;
            btn.onclick = () => {
                alert("Du röstade på " + p.name);
                btnContainer.innerHTML = "Väntar på andra...";
            };
            btnContainer.appendChild(btn);
        });
    }

    socket.on('error', (msg) => alert(msg));
</script>

</body>
</html>
