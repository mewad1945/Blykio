<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLYKIO ELITE</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6366f1; --p-dark: #4f46e5; --bg: #0b0f1a; --box: #161e2d; --text: #ffffff; --imp: #ff4757; --inn: #2ed573; --accent: #00d2ff; }
        * { box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .hidden { display: none !important; }
        .box { width: 95%; max-width: 500px; background: var(--box); padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 20px 60px rgba(0,0,0,0.6); text-align: center; }
        h1 { font-size: 3.5rem; font-weight: 900; margin: 0; background: linear-gradient(135deg, var(--p), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input, select { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 12px; border: 2px solid #2d3748; background: #0b101b; color: #fff; outline: none; }
        button { background: var(--p); color: white; border: none; padding: 16px; border-radius: 15px; cursor: pointer; font-weight: 700; width: 100%; transition: 0.3s; margin-top: 5px; }
        button:hover { background: var(--p-dark); transform: translateY(-2px); }
        .secondary-btn { background: #2d3748; }
        .match-card { background: rgba(255,255,255,0.03); border: 1px solid #2d3748; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .chat { height: 220px; background: #0b101b; overflow-y: auto; padding: 15px; margin: 15px 0; border-radius: 20px; text-align: left; border: 1px solid #2d3748; }
        .status-pill { background: rgba(255,255,255,0.05); padding: 5px 15px; border-radius: 100px; font-size: 0.8rem; font-weight: bold; color: var(--accent); display: inline-block; margin-bottom: 10px;}
        label { display: block; text-align: left; font-size: 0.75rem; color: #64748b; margin-bottom: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div id="app" style="width: 100%; display: flex; justify-content: center;">
    <div id="screen-login" class="box">
        <h1>BLYKIO</h1>
        <label>VÄLJ SPRÅK / LANGUAGE</label>
        <select id="user-lang">
            <option value="sv">Svenska 🇸🇪</option>
            <option value="en">English 🇬🇧</option>
        </select>
        <input type="text" id="username" placeholder="Nickname...">
        <button onclick="login()">ANSLUT</button>
    </div>

    <div id="screen-menu" class="box hidden">
        <h1>BLYKIO</h1>
        <p>Inloggad som <b id="display-name" style="color:var(--accent)"></b></p>
        <button onclick="showScreen('screen-create')">SKAPA MATCH</button>
        <button class="secondary-btn" onclick="openFindMatch()">HITTA SPEL</button>
    </div>

    <div id="screen-create" class="box hidden">
        <h2>Match-inställningar</h2>
        <label>KATEGORI</label>
        <select id="setting-cat"></select>
        
        <label>IMPOSTERS</label>
        <select id="setting-imp">
            <option value="1">1 Imposter</option>
            <option value="2">2 Imposters</option>
        </select>

        <label>LEDTRÅDAR PER PERSON</label>
        <select id="setting-turns">
            <option value="1">1 gång</option>
            <option value="2" selected>2 gånger</option>
            <option value="3">3 gånger</option>
        </select>

        <label>SYNLIGHET</label>
        <select id="setting-privacy">
            <option value="public">Publik (Syns i listan)</option>
            <option value="private">Privat (Bara kod)</option>
        </select>

        <button onclick="createMatch()">SKAPA LOBBY</button>
        <button onclick="showScreen('screen-menu')" class="secondary-btn">TILLBAKA</button>
    </div>

    <div id="screen-join" class="box hidden">
        <h2>Aktiva Spel</h2>
        <div id="public-games-list" style="max-height: 250px; overflow-y: auto;"></div>
        <input type="text" id="join-code-input" placeholder="Ange kod (t.ex. X4Y2)..." style="margin-top:10px;">
        <button onclick="joinByCode()">GÅ MED VIA KOD</button>
        <button onclick="showScreen('screen-menu')" class="secondary-btn">TILLBAKA</button>
    </div>

    <div id="screen-game" class="box hidden">
        <div class="status-pill">KOD: <span id="match-id-display"></span></div>
        <div id="game-lobby-area">
            <div id="lobby-list" style="margin: 20px 0; text-align:left;"></div>
            <button id="start-btn" class="hidden" onclick="socket.emit('startGame', myData.roomId)">STARTA SPELET</button>
        </div>
        <div id="game-play-area" class="hidden">
            <div id="role-box" style="padding:15px; border-radius:15px; margin-bottom:10px; font-weight:bold;"></div>
            <div class="chat" id="game-chat"></div>
            <p id="turn-indicator" style="font-weight:bold; color:var(--accent)"></p>
            <div id="turn-input-container">
                <input type="text" id="word-input" placeholder="Din ledtråd...">
                <button onclick="sendWord()">SKICKA</button>
            </div>
            <div id="voting-area" class="hidden">
                <h3 style="color:var(--imp)">VEM ÄR IMPOSTER?</h3>
                <div id="vote-list"></div>
            </div>
        </div>
        <div id="result-area" class="hidden">
            <h2 id="result-title"></h2>
            <p id="result-desc"></p>
            <button onclick="location.reload()">TILL MENY</button>
        </div>
    </div>
</div>

<script>
    const socket = io('http://194.164.206.144:3000'); 
    let myData = { name: '', roomId: '', lang: 'sv' };

    const categories = {
        'sv': ['Djur 🦁', 'Mat 🍕', 'Kändisar ⭐', 'Platser 🌍', 'Föremål 📦'],
        'en': ['Animals 🦁', 'Food 🍕', 'Famous People ⭐', 'Places 🌍', 'Objects 📦']
    };

    function showScreen(id) {
        document.querySelectorAll('.box').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function login() {
        myData.name = document.getElementById('username').value.trim();
        myData.lang = document.getElementById('user-lang').value;
        if(!myData.name) return;

        // Uppdatera kategorier baserat på språk
        const catSelect = document.getElementById('setting-cat');
        catSelect.innerHTML = categories[myData.lang].map(c => `<option value="${c}">${c}</option>`).join('');
        
        document.getElementById('display-name').innerText = myData.name;
        showScreen('screen-menu');
    }

    function createMatch() {
        const settings = {
            language: myData.lang,
            category: document.getElementById('setting-cat').value,
            turnsPerPlayer: parseInt(document.getElementById('setting-turns').value),
            imposterCount: document.getElementById('setting-imp').value,
            isPublic: document.getElementById('setting-privacy').value === 'public',
            maxPlayers: 10
        };
        socket.emit('createMatch', { name: myData.name, settings });
    }

    function openFindMatch() {
        showScreen('screen-join');
        socket.emit('getPublicGames');
    }

    function joinByCode() {
        const code = document.getElementById('join-code-input').value.trim().toUpperCase();
        if(code) socket.emit('joinMatch', { name: myData.name, code });
    }

    socket.on('publicGamesList', list => {
        const container = document.getElementById('public-games-list');
        container.innerHTML = list.map(g => `
            <div class="match-card" onclick="socket.emit('joinMatch', {name: myData.name, code: '${g.id}'})">
                <div style="text-align:left"><b>${g.host}</b><br><small>${g.category}</small></div>
                <span>${g.players}/10 👤</span>
            </div>
        `).join('') || "Inga publika matcher...";
    });

    socket.on('matchCreated', room => setupLobby(room));
    socket.on('matchJoined', room => setupLobby(room));

    function setupLobby(room) {
        myData.roomId = room.id;
        document.getElementById('match-id-display').innerText = room.id;
        showScreen('screen-game');
        updateList(room.players);
    }

    socket.on('updatePlayers', data => updateList(data.players));

    function updateList(players) {
        document.getElementById('lobby-list').innerHTML = players.map(p => `<div>👤 ${p.name}</div>`).join('');
        if (players[0].id === socket.id) document.getElementById('start-btn').classList.remove('hidden');
    }

    socket.on('gameStarted', data => {
        document.getElementById('game-lobby-area').classList.add('hidden');
        document.getElementById('game-play-area').classList.remove('hidden');
        document.getElementById('game-chat').innerHTML = "";
        const isImp = data.imposters.includes(socket.id);
        const rb = document.getElementById('role-box');
        if(isImp) {
            rb.innerHTML = "ROLE: <span style='color:var(--imp)'>IMPOSTER 😈</span><br>" + (myData.lang === 'sv' ? "Lura dem!" : "Deceive them!");
            rb.style.background = "rgba(255, 71, 87, 0.1)";
        } else {
            rb.innerHTML = (myData.lang === 'sv' ? "ORDET: " : "WORD: ") + "<span style='color:var(--inn)'>" + data.word + "</span>";
            rb.style.background = "rgba(46, 213, 115, 0.1)";
        }
        updateUI(data.turnPlayer);
    });

    function sendWord() {
        const val = document.getElementById('word-input').value.trim();
        if(val) {
            socket.emit('sendWord', { roomId: myData.roomId, name: myData.name, word: val });
            document.getElementById('word-input').value = "";
        }
    }

    socket.on('newWord', data => {
        const chat = document.getElementById('game-chat');
        chat.innerHTML += `<p><b>${data.sender}:</b> ${data.word}</p>`;
        chat.scrollTop = chat.scrollHeight;
        if(data.nextTurn) updateUI(data.nextTurn);
    });

    function updateUI(p) {
        document.getElementById('turn-indicator').innerText = (p === myData.name) ? (myData.lang === 'sv' ? "DIN TUR!" : "YOUR TURN!") : `${p}...`;
        document.getElementById('turn-input-container').classList.toggle('hidden', p !== myData.name);
    }

    socket.on('startVoting', data => {
        document.getElementById('turn-input-container').classList.add('hidden');
        document.getElementById('voting-area').classList.remove('hidden');
        document.getElementById('vote-list').innerHTML = data.players.filter(p => p.id !== socket.id).map(p => 
            `<button class="secondary-btn" onclick="socket.emit('castVote', {roomId: myData.roomId, targetId: '${p.id}'})">${p.name}</button>`
        ).join('');
    });

    socket.on('roundResult', data => {
        document.getElementById('game-play-area').classList.add('hidden');
        document.getElementById('result-area').classList.remove('hidden');
        const winTxt = data.isCorrect ? (myData.lang === 'sv' ? "INNOCENTS VANN!" : "INNOCENTS WIN!") : (myData.lang === 'sv' ? "IMPOSTER VANN!" : "IMPOSTER WINS!");
        document.getElementById('result-title').innerText = winTxt;
        document.getElementById('result-desc').innerHTML = `Imposter: ${data.imposters.join(', ')}<br>Word: ${data.word}`;
    });

    socket.on('leaderLeft', () => { location.reload(); });
    socket.on('error', (msg) => alert(msg));
</script>
</body>
</html>
